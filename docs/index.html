<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>TRAC Playground</title>
        <style>
            :root {
                --border: #d0d0d0;
                --muted: #888;
                --bg-output: #fafafa;
            }
            * {
                box-sizing: border-box;
            }
            body {
                font: 14px/1.4 system-ui, -apple-system, sans-serif;
                margin: 0;
                padding: 0.75rem;
                height: 100vh;
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
            }
            header {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                flex-wrap: wrap;
            }
            h1 {
                font-size: 1.1rem;
                margin: 0;
                font-weight: 600;
            }
            h1 a {
                color: inherit;
                text-decoration: none;
            }
            label {
                display: inline-flex;
                align-items: center;
                gap: 0.25rem;
            }
            select,
            button {
                font: inherit;
                padding: 0.25rem 0.5rem;
                border: 1px solid var(--border);
                background: white;
                border-radius: 4px;
                cursor: pointer;
            }
            button {
                font-weight: 600;
            }
            button:hover {
                background: #f0f0f0;
            }
            main {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0.5rem;
                flex: 1;
                min-height: 0;
            }
            textarea,
            pre {
                font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
                padding: 0.5rem;
                border: 1px solid var(--border);
                border-radius: 4px;
                margin: 0;
                width: 100%;
                height: 100%;
                overflow: auto;
            }
            textarea {
                resize: none;
            }
            pre {
                background: var(--bg-output);
                white-space: pre-wrap;
                word-break: break-word;
            }
            footer {
                color: var(--muted);
                font-size: 12px;
            }
            footer a {
                color: inherit;
            }
            .err {
                color: #b00020;
            }
            @media (max-width: 720px) {
                main {
                    grid-template-columns: 1fr;
                    grid-template-rows: 1fr 1fr;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <h1><a href="https://github.com/begoon/trac">TRAC</a> Playground</h1>
            <label>
                Example:
                <select id="examples">
                    <option value="hello">Hello, world!</option>
                    <option value="factorial">factorial</option>
                    <option value="e">e constant</option>
                    <option value="pi">pi constant</option>
                    <option value="hanoi">Hanoi</option>
                    <option value="rule_110">Rule 110</option>
                </select>
            </label>
            <button id="run" title="Ctrl/Cmd-Enter">Run ▶</button>
            <button id="reset" title="Reload the selected example, discarding local changes">Reset</button>
            <span id="status"></span>
        </header>
        <main>
            <textarea id="code" spellcheck="false" autocomplete="off" placeholder="TRAC code..."></textarea>
            <pre id="output"></pre>
        </main>
        <footer>
            TRAC-64 interpreter &mdash; <a href="https://github.com/begoon/trac">begoon/trac</a> &mdash;
            end a record with the meta character <code>'</code>.
        </footer>
        <script type="module" src="./script.js"></script>
    </body>
</html>
